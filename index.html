<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待審核 · 保險知識研究室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f0ec;--surface:#fff;--surface2:#f8f6f2;
  --border:#e8e2d8;--border2:#ddd5c8;
  --gold:#c4a77d;--gold-dim:#a8855a;
  --text:#3d3529;--muted:#a89880;--muted2:#ccc0ae;
  --green:#4a9e6e;--red:#c0392b;--amber:#c4a77d;
  --topbar:#fdfaf5;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── Topbar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1rem,3vw,2rem);height:52px;
  background:var(--topbar);border-bottom:1px solid var(--border);
  box-shadow:0 1px 8px rgba(0,0,0,.04);
}
.topbar-brand{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:500;color:var(--gold);letter-spacing:0.12em}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-count{font-size:11px;color:var(--muted)}
.topbar-count span{color:var(--gold);font-weight:600}
.btn-refresh{padding:5px 13px;background:transparent;border:1px solid var(--border2);border-radius:20px;color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.btn-refresh:hover{border-color:var(--gold);color:var(--gold)}
.btn-refresh.spinning .ri{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ri{display:inline-block}

/* palette */
.palette-wrap{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.pal-label{font-size:9px;color:var(--muted2);letter-spacing:0.08em}
.pal-btn{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .15s,border-color .15s}
.pal-btn:hover,.pal-btn.active{transform:scale(1.2);border-color:var(--text)}
.pal-custom{background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}
.pal-divider{width:1px;height:14px;background:var(--border2);margin:0 2px}
#customColor{position:absolute;opacity:0;width:0;height:0}

/* ── Layout ── */
.main{padding-top:52px;display:grid;grid-template-columns:240px 1fr clamp(280px,28vw,360px);height:100vh}
@media(max-width:900px){.main{grid-template-columns:200px 1fr clamp(240px,30vw,320px)}}

/* ── Sidebar ── */
.sidebar{border-right:1px solid var(--border);overflow-y:auto;height:calc(100vh - 52px);position:sticky;top:52px;background:var(--topbar)}
.sb-label{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted2);padding:1.25rem 1.25rem 0.6rem;border-bottom:1px solid var(--border)}
.draft-item{padding:.9rem 1.25rem;cursor:pointer;border-left:2px solid transparent;border-bottom:1px solid var(--border);transition:all .15s}
.draft-item:hover{background:var(--surface2);border-left-color:var(--gold-dim)}
.draft-item.active{background:#fff;border-left-color:var(--gold)}
.di-id{font-size:9px;color:var(--muted2);margin-bottom:3px;letter-spacing:0.06em}
.di-title{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:4px;font-weight:500}
.di-meta{font-size:10px;color:var(--muted)}
.di-type{display:inline-block;font-size:8px;padding:1px 6px;border-radius:2px;border:1px solid var(--border2);color:var(--muted);margin-top:4px;letter-spacing:0.06em}
.sb-empty{padding:2rem 1.25rem;text-align:center;color:var(--muted);font-size:12px;line-height:1.7}

/* ── Preview panel ── */
.preview-panel{padding:clamp(1.25rem,2vw,1.75rem);display:flex;flex-direction:column;height:calc(100vh - 52px);overflow:hidden;position:sticky;top:52px;background:var(--bg)}
.section-label{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;flex-shrink:0}

/* fixed carousel container — never changes id */
.carousel-container{flex:1;min-height:0;overflow:hidden;position:relative}
.carousel-track{display:flex;gap:12px;height:100%;transition:transform .42s cubic-bezier(.4,0,.2,1)}

/* empty state inside container */
.c-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;gap:10px}
.c-empty-icon{font-size:28px;opacity:.25}
.c-empty-text{font-size:12px;line-height:1.7}

/* ── Card styles: 3 themes ── */
.ig-card{
  flex-shrink:0;height:100%;
  border-radius:4px;position:relative;overflow:hidden;
  cursor:pointer;transition:box-shadow .2s,border-color .2s;
  container-type:size;
}

/* Theme A — 手帳米白 */
.theme-a{background:#fdfaf5;border:1px solid #ede5d8}
.theme-a::before{content:'';position:absolute;left:12%;right:12%;top:55%;height:1px;background:#f0e8da;pointer-events:none}
.theme-a::after{content:'';position:absolute;left:12%;right:12%;top:65%;height:1px;background:#f0e8da;pointer-events:none}
.theme-a.active{border-color:#c4a77d;box-shadow:0 0 0 1px #c4a77d}

/* Theme B — 薄霧藍 */
.theme-b{background:#f5f9fc;border:1px solid #d8eaf4}
.theme-b .card-bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,#8ec5dc,#f4a96a)}
.theme-b.active{border-color:#5a9ab8;box-shadow:0 0 0 1px #5a9ab8}

/* Theme C — 抹茶綠 */
.theme-c{background:#f0f5f0;border:1px solid #d8eada}
.theme-c .card-arc{position:absolute;top:-30%;right:-20%;width:65%;height:65%;border-radius:50%;border:1px solid rgba(160,200,164,.25);pointer-events:none}
.theme-c .card-arc2{position:absolute;top:-18%;right:-8%;width:42%;height:42%;border-radius:50%;border:1px solid rgba(160,200,164,.15);pointer-events:none}
.theme-c.active{border-color:#6a9e72;box-shadow:0 0 0 1px #6a9e72}

/* Card inner — shared */
.card-safe{position:absolute;inset:12%;display:flex;flex-direction:column;justify-content:space-between}
.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.card-body{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding-top:.5rem}
.card-bottom{display:flex;justify-content:flex-end;padding-top:.35rem}

/* theme-a text */
.theme-a .card-num{font-size:2cqh;color:#ccc;letter-spacing:0.1em;font-family:'Inter',sans-serif}
.theme-a .card-tag{font-size:1.8cqh;color:#c4a77d;letter-spacing:0.1em;border-bottom:1px solid #dcc99a;padding-bottom:.2cqh}
.theme-a .card-headline{font-family:'Noto Serif TC',serif;font-size:6.2cqh;font-weight:500;line-height:1.6;color:#3d3529;margin-bottom:.6cqh}
.theme-a .card-headline em{font-style:normal;color:#c4a77d}
.theme-a .card-copy{font-size:3cqh;line-height:1.85;color:#a89880;font-weight:300}
.theme-a .card-brand{font-size:1.8cqh;color:#cbbfa8;letter-spacing:0.08em;font-style:italic;font-family:'Inter',sans-serif}

/* theme-b text */
.theme-b .card-num{font-size:2cqh;color:#bcd2e0;letter-spacing:0.1em;font-family:'Inter',sans-serif}
.theme-b .card-tag{font-size:1.8cqh;color:#5a9ab8;letter-spacing:0.1em;border:1px solid #b0d4e8;padding:.3cqh .8cqh;border-radius:2px}
.theme-b .card-bignum{font-family:'DM Serif Display',serif;font-size:14cqh;line-height:1;color:#5a9ab8;margin-bottom:.4cqh;letter-spacing:-1px}
.theme-b .card-headline{font-family:'Noto Serif TC',serif;font-size:5.5cqh;font-weight:400;line-height:1.6;color:#2e4a5a;margin-bottom:.6cqh}
.theme-b .card-headline em{font-style:normal;color:#e8834a}
.theme-b .card-copy{font-size:3cqh;line-height:1.85;color:#7ba0b4;font-weight:300}
.theme-b .card-brand{font-size:1.8cqh;color:#b0ccd8;letter-spacing:0.08em;font-style:italic;font-family:'Inter',sans-serif}

/* theme-c text */
.theme-c .card-num{font-size:2cqh;color:#b8ceba;letter-spacing:0.1em;font-family:'Inter',sans-serif}
.theme-c .card-tag{font-size:1.8cqh;color:#6a9e72;letter-spacing:0.1em}
.theme-c .card-headline{font-family:'Noto Serif TC',serif;font-size:5.8cqh;font-weight:500;line-height:1.65;color:#2a3d2c;margin-bottom:.5cqh}
.theme-c .card-headline em{font-style:normal;color:#6a9e72}
.theme-c .card-rule{width:22px;height:1px;background:#b8d4ba;margin:.5cqh 0}
.theme-c .card-copy{font-size:3cqh;line-height:1.85;color:#7a9e7c;font-weight:300}
.theme-c .card-brand{font-size:1.8cqh;color:#aac4ac;letter-spacing:0.08em;font-style:italic;font-family:'Inter',sans-serif}

/* carousel nav */
.carousel-nav{display:flex;align-items:center;gap:10px;margin-top:1rem;flex-shrink:0}
.dots{display:flex;gap:5px;align-items:center}
.dot{width:16px;height:2px;background:var(--border2);border-radius:1px;cursor:pointer;transition:all .25s}
.dot.active{background:var(--gold);width:24px}
.arr-btn{width:30px;height:30px;background:var(--surface);border:1px solid var(--border2);border-radius:2px;color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.arr-btn:hover{border-color:var(--gold)}
.arr-btn:disabled{opacity:.3;cursor:default}

/* theme selector in preview */
.theme-selector{display:flex;gap:6px;margin-bottom:.75rem;flex-shrink:0}
.theme-pill{padding:4px 12px;font-size:10px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;color:var(--muted);background:transparent;font-family:'Inter',sans-serif;transition:all .15s;letter-spacing:0.06em}
.theme-pill:hover{border-color:var(--gold);color:var(--gold)}
.theme-pill.active{background:var(--gold);border-color:var(--gold);color:#fff}

/* ── Review panel ── */
.review-panel{padding:clamp(1.25rem,2.5vw,2rem);display:flex;flex-direction:column;overflow-y:auto;height:calc(100vh - 52px);position:sticky;top:52px;background:var(--topbar);border-left:1px solid var(--border)}
.rev-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center;line-height:1.7}
.review-block{margin-bottom:1.5rem}
.review-title{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted2);margin-bottom:.6rem}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.meta-item{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 11px}
.meta-key{font-size:9px;color:var(--muted2);margin-bottom:2px}
.meta-val{font-size:12px;font-weight:500;color:var(--text)}
.meta-val.gold{color:var(--gold-dim)}
.caption-box{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px 14px;font-size:12px;line-height:1.85;color:var(--muted);white-space:pre-line}
.hashtag-list{display:flex;flex-wrap:wrap;gap:5px}
.hashtag{font-size:10px;color:var(--gold-dim);background:rgba(196,167,125,.06);border:1px solid rgba(196,167,125,.2);border-radius:2px;padding:2px 7px}
.schedule-row{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-size:12px;color:var(--text)}
.schedule-icon{color:var(--gold);font-size:14px}
.schedule-sub{font-size:10px;color:var(--muted);margin-top:2px}

/* buttons */
.actions{margin-top:auto}
.divider-line{height:1px;background:var(--border);margin-bottom:1.1rem}
.btn-agree{width:100%;padding:12px;background:var(--green);border:none;border-radius:6px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:.06em;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .2s}
.btn-agree:hover{opacity:.88}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-reedit{padding:10px;background:transparent;border:1px solid #d4aa6a;border-radius:6px;color:#b8860b;font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .2s}
.btn-reedit:hover{background:rgba(196,167,125,.08)}
.btn-notgood{padding:10px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:border-color .2s,color .2s}
.btn-notgood:hover{border-color:#c0392b;color:#c0392b}

/* ── Re-edit floating ── */
.reedit-panel{position:fixed;inset:0;z-index:200;pointer-events:none;opacity:0;transition:opacity .2s}
.reedit-panel.open{opacity:1}
.reedit-sheet{position:absolute;top:80px;left:50%;transform:translateX(-50%);width:min(680px,92vw);min-width:280px;min-height:220px;max-height:88vh;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.15);display:flex;flex-direction:column;overflow:hidden;pointer-events:all;resize:both}
.reedit-titlebar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:grab;user-select:none;flex-shrink:0}
.reedit-titlebar:active{cursor:grabbing}
.reedit-tl{display:flex;align-items:center;gap:8px}
.reedit-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:500;color:var(--gold-dim)}
.reedit-hint{font-size:9px;color:var(--muted2);letter-spacing:.06em}
.reedit-close{width:28px;height:28px;background:transparent;border:1px solid var(--border2);border-radius:50%;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s}
.reedit-close:hover{border-color:#c0392b;color:#c0392b}
.reedit-body-wrap{overflow-y:auto;flex:1;padding:1.25rem}
.reedit-grid{display:grid;grid-template-columns:155px 1fr;gap:14px;margin-bottom:1rem}
.reedit-tabs{display:flex;flex-direction:column;gap:5px}
.r-tab{padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:11px;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:6px}
.r-tab:hover{border-color:var(--gold-dim);color:var(--text)}
.r-tab.active{border-color:var(--gold);color:var(--gold-dim);background:#fdf8f0}
.r-tab-num{font-size:9px;color:var(--muted2);flex-shrink:0}
.r-tab.active .r-tab-num{color:var(--gold-dim)}
.reedit-fields{display:flex;flex-direction:column;gap:9px}
.r-field-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:3px}
.r-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:9px 11px;color:var(--text);font-family:'Noto Serif TC',serif;font-size:13px;line-height:1.6;resize:vertical;min-height:76px;outline:none;transition:border-color .2s}
.r-textarea:focus{border-color:var(--gold-dim)}
.r-textarea.sm{font-family:'Inter',sans-serif;font-size:12px;min-height:60px}
.r-note-ta{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 11px;color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;line-height:1.7;resize:vertical;min-height:52px;outline:none;transition:border-color .2s}
.r-note-ta:focus{border-color:var(--gold-dim)}
.r-note-ta::placeholder{color:var(--muted2)}
.quick-labels{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.9rem}
.ql{font-size:10px;color:var(--muted);border:1px solid var(--border2);border-radius:2px;padding:3px 9px;cursor:pointer;background:transparent;font-family:'Inter',sans-serif;transition:all .15s}
.ql:hover,.ql.sel{border-color:#d4aa6a;color:#b8860b;background:rgba(196,167,125,.06)}
.reedit-actions{display:flex;justify-content:flex-end;gap:7px;padding-top:.75rem;border-top:1px solid var(--border)}
.r-save{padding:8px 20px;background:var(--gold);border:none;border-radius:4px;color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s}
.r-save:hover{opacity:.85}
.r-cancel{padding:8px 14px;background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:border-color .2s}
.r-cancel:hover{border-color:var(--muted)}

/* ── Agree confirm ── */
.confirm-overlay{position:fixed;inset:0;z-index:200;background:rgba(240,237,232,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-box{background:#fff;border:1px solid #b8d4ba;border-radius:8px;padding:2rem;width:min(360px,90vw);text-align:center;transform:scale(.96);transition:transform .25s;box-shadow:0 12px 40px rgba(0,0,0,.08)}
.confirm-overlay.open .confirm-box{transform:scale(1)}
.confirm-icon{font-size:26px;margin-bottom:.5rem}
.confirm-title{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:500;color:var(--green);margin-bottom:5px}
.confirm-sub{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:1.1rem}
.confirm-time{font-size:18px;font-weight:600;color:var(--text);margin-bottom:3px}
.confirm-date{font-size:10px;color:var(--muted);margin-bottom:1.1rem}
.confirm-btn{padding:9px 26px;background:var(--green);border:none;border-radius:6px;color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s}
.confirm-btn:hover{opacity:.85}

/* toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(14px);background:#fff;border:1px solid var(--border2);border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:10px 18px;font-size:12px;color:var(--text);opacity:0;transition:opacity .3s,transform .3s;z-index:300;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.tg{border-color:#b8d4ba;color:var(--green)}
.toast.ta{border-color:#d4aa6a;color:#b8860b}
.toast.tr{border-color:#e8a0a0;color:#c0392b}

/* loading */
.loading-bar{position:fixed;top:52px;left:0;right:0;height:2px;background:linear-gradient(to right,var(--gold),#e8c88a);z-index:99;transform:scaleX(0);transform-origin:left;opacity:0;transition:opacity .3s}
.loading-bar.active{animation:lb 1.2s ease forwards}
@keyframes lb{0%{transform:scaleX(0);opacity:1}80%{transform:scaleX(.9);opacity:1}100%{transform:scaleX(1);opacity:0}}
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-brand">保險知識研究室 · 待審核</div>

  <div class="palette-wrap">
    <span class="pal-label">主題色</span>
    <div class="pal-btn active" style="background:#c4a77d" onclick="setAccent('#c4a77d','#a8855a',this)" title="焦糖金"></div>
    <div class="pal-btn" style="background:#5a9ab8" onclick="setAccent('#5a9ab8','#3d7a98',this)" title="霧藍"></div>
    <div class="pal-btn" style="background:#6a9e72" onclick="setAccent('#6a9e72','#4a7e52',this)" title="抹茶"></div>
    <div class="pal-btn" style="background:#c97de0" onclick="setAccent('#c97de0','#a05ab8',this)" title="薰衣草"></div>
    <div class="pal-btn" style="background:#e8834a" onclick="setAccent('#e8834a','#c4622a',this)" title="珊瑚橙"></div>
    <div class="pal-divider"></div>
    <div class="pal-btn pal-custom" onclick="document.getElementById('customColor').click()">+</div>
    <input type="color" id="customColor" value="#c4a77d" oninput="onCustomColor(this.value)">
  </div>

  <div class="topbar-right">
    <span class="topbar-count">待審核 <span id="draftCount">—</span> 篇</span>
    <button class="btn-refresh" id="refreshBtn" onclick="loadDrafts()">
      <span class="ri">↻</span> 更新
    </button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-label">待審稿件</div>
    <div id="draftList"><div class="sb-empty">載入中…</div></div>
  </div>

  <!-- Preview -->
  <div class="preview-panel">
    <div class="section-label" id="previewLabel">Carousel 預覽</div>
    <div class="theme-selector" id="themeSelector" style="display:none">
      <button class="theme-pill active" onclick="setTheme('a',this)">手帳米白</button>
      <button class="theme-pill" onclick="setTheme('b',this)">薄霧藍</button>
      <button class="theme-pill" onclick="setTheme('c',this)">抹茶綠</button>
    </div>
    <!-- THIS id never changes -->
    <div class="carousel-container" id="carouselContainer">
      <div class="c-empty">
        <div class="c-empty-icon">◫</div>
        <div class="c-empty-text">從左側選擇一篇稿件<br>即可預覽 Carousel</div>
      </div>
    </div>
    <div class="carousel-nav" id="carouselNav" style="display:none">
      <button class="arr-btn" id="prevBtn" onclick="prev()" disabled>←</button>
      <button class="arr-btn" id="nextBtn" onclick="next()">→</button>
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <!-- Review -->
  <div class="review-panel" id="reviewPanel">
    <div class="rev-empty">← 選擇左側稿件<br>開始審核</div>
  </div>

</div>

<!-- Re-edit -->
<div class="reedit-panel" id="reeditPanel">
  <div class="reedit-sheet" id="reeditSheet">
    <div class="reedit-titlebar" id="reeditBar">
      <div class="reedit-tl">
        <span class="reedit-title">✎ 直接編輯文案</span>
        <span class="reedit-hint">拖移移動 · 右下角縮放</span>
      </div>
      <button class="reedit-close" onclick="closeReedit()">✕</button>
    </div>
    <div class="reedit-body-wrap">
      <div class="reedit-grid">
        <div class="reedit-tabs" id="reeditTabs"></div>
        <div class="reedit-fields">
          <div>
            <div class="r-field-label">標題文案（大字）</div>
            <textarea class="r-textarea" id="editHL" rows="3"></textarea>
          </div>
          <div>
            <div class="r-field-label">內文（小字，可留空）</div>
            <textarea class="r-textarea sm" id="editCP" rows="3"></textarea>
          </div>
          <div>
            <div class="r-field-label">給 AI 的修改指示（可選）</div>
            <textarea class="r-note-ta" id="editNote" placeholder="例：語氣太說教，改成像朋友提醒…"></textarea>
          </div>
        </div>
      </div>
      <div class="quick-labels">
        <button class="ql" onclick="addNote(this,'封面太弱，換更衝擊的開場')">封面太弱</button>
        <button class="ql" onclick="addNote(this,'語氣太說教')">太說教</button>
        <button class="ql" onclick="addNote(this,'數字不夠具體')">數字不具體</button>
        <button class="ql" onclick="addNote(this,'對比太簡單')">對比太弱</button>
        <button class="ql" onclick="addNote(this,'字太多，壓縮')">字太多</button>
        <button class="ql" onclick="addNote(this,'結尾不清楚')">結尾不清楚</button>
      </div>
      <div class="reedit-actions">
        <button class="r-cancel" onclick="closeReedit()">取消</button>
        <button class="r-save" onclick="applyEdits()">✓ 套用修改，重新預覽</button>
      </div>
    </div>
  </div>
</div>

<!-- Agree confirm -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">✓</div>
    <div class="confirm-title">已排入排程</div>
    <div class="confirm-sub">這組文案將在以下時間自動發佈至 Instagram</div>
    <div class="confirm-time" id="confirmTime">—</div>
    <div class="confirm-date">台北時間</div>
    <button class="confirm-btn" onclick="closeConfirm()">完成</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxboG6NkzAaY_b44Wr7G0lDg9m8FjZzwnN48Rs4TXaoxNfR5A3WhImcB_JQ5eXaImC6/exec';

// ── Demo data ──
const DEMO = [
  {
    稿件ID:'D-001',生成時間:'2026/06/25 09:14',鉤子來源:'貓王 Elvis · 遺產案',
    模板類型:'名人事件型',狀態:'待審核',
    核心訊息:'貓王 Elvis 1977 年猝逝，遺產 7,700 萬美元，稅務局拿走 70%。不是沒錢——是沒有現金。',

    _cards:[
      {tag:'遺產規劃',headline:'問題從來不是\n怎麼少繳稅。\n<em>是家人能不能\n拿出現金。</em>',copy:''},
      {tag:'名人案例',headline:'<em>貓王 Elvis</em>\n1977 年猝逝',copy:'遺產 7,700 萬美元\n稅務局拿走 70%\n女兒 Lisa Marie 還債二十年\n\n不是沒錢——是沒有現金。'},
      {tag:'台灣現實',headline:'台灣遺產稅\n<em>最高 20%</em>',copy:'一棟 2,000 萬的房子\n稅單可能是 400 萬現金\n九個月內繳清\n\n你的家人，準備好了嗎？'},
      {tag:'對比',headline:'<em>同樣是離開</em>\n結果天壤之別',copy:'沒預留 → 賣房還稅、兄弟鬩牆\n有預留 → 稅單到，錢到\n\n差別只在一個決定。'},
      {tag:'行動',headline:'你以為你\n規劃好了——',copy:'但你算過嗎？\n\n第一步，\n永遠是先知道你的數字。'}
    ]
  },
  {
    稿件ID:'D-002',生成時間:'2026/06/25 09:30',鉤子來源:'科技創辦人罹癌',
    模板類型:'數字衝擊型',狀態:'待審核',
    核心訊息:'股權凍結、繼承人爭議——企業主最容易忽略的保障缺口。',
    Hashtag:'#壽險 #股權 #企業主 #保險 #傳承 #理財 #保險知識研究室',
    建議發文時間:'2026/06/29（一）· 12:00',
    _cards:[
      {tag:'企業主',headline:'你的公司，\n<em>你不在了</em>\n誰說了算？',copy:''},
      {tag:'現實',headline:'股權是資產，\n但<em>股權不是現金</em>。',copy:'繼承人要繳的稅，\n需要的是現金。\n\n你有準備嗎？'},
      {tag:'案例',headline:'賈伯斯走的時候\n蘋果股票跌了 <em>5%</em>',copy:'帳面 100 億。\n但稅單要現金。\n賣還是不賣？\n這才是繼承人的第一個問題。'},
      {tag:'對比',headline:'同樣是企業主\n<em>差別在這裡</em>',copy:'沒規劃 → 股權凍結、家人借錢繳稅\n有規劃 → 保單現金立即給付'},
      {tag:'行動',headline:'第一步，\n永遠是先\n<em>知道數字</em>。',copy:'你的股權值多少？\n繼承人要付多少稅？\n先算清楚。'}
    ]
  },
  {
    稿件ID:'D-003',生成時間:'2026/06/26 10:00',鉤子來源:'台灣高齡化速度創新高',
    模板類型:'數據衝擊型',狀態:'待審核',
    核心訊息:'台灣高齡化速度超越日本，退休規劃不能再等。',
    Hashtag:'#退休規劃 #長照 #保險 #台灣保險 #理財 #保險知識研究室',
    建議發文時間:'2026/07/01（三）· 18:00',
    _cards:[
      {tag:'退休',headline:'你以為\n六十五歲退休——\n<em>錢夠撐幾年？</em>',copy:''},
      {tag:'數據',headline:'台灣平均餘命\n<em>83 歲</em>',copy:'退休到離開，\n平均還有 18 年。\n你的錢，準備好了嗎？'},
      {tag:'現實',headline:'長照費用\n<em>每月 3–8 萬</em>',copy:'一旦需要長照，\n最少撐三年，\n就是一百萬起跳。'},
      {tag:'對比',headline:'有準備的人\n<em>從容</em>交棒',copy:'沒準備 → 子女被迫放棄工作照顧\n有準備 → 費用有著落，關係不撕裂'},
      {tag:'行動',headline:'第一步，\n永遠是先\n<em>知道你的數字</em>。',copy:'退休後要多少錢？\n長照怎麼規劃？\n先把數字算出來。'}
    ]
  }
];

// ── State ──
let drafts = [];
let activeDraftIdx = -1;
let current = 0;
let currentTheme = 'a';
const GAP = 12;

// ── Load ──
async function loadDrafts() {
  const btn = document.getElementById('refreshBtn');
  const bar = document.getElementById('loadingBar');
  btn.classList.add('spinning');
  bar.classList.add('active');
  try {
    const res = await fetch(GAS_URL);
    const json = await res.json();
    drafts = (json.success && json.data && json.data.length > 0)
      ? json.data.map(parseDraft) : DEMO;
  } catch(e) { drafts = DEMO; }
  btn.classList.remove('spinning');
  bar.classList.remove('active');
  document.getElementById('draftCount').textContent = drafts.length;
  renderSidebar();
  if (drafts.length > 0 && activeDraftIdx < 0) selectDraft(0);
}

function parseDraft(row) {
  const labels = ['封面','觀念','案例','對比','行動'];
  const cards = Array.from({length:5},(_,i)=>({
    tag: labels[i],
    headline: row[`張${i+1}標題`] || (i===0 ? row['封面文案']||'' : ''),
    copy: row[`張${i+1}內文`] || ''
  }));
  return {...row, _cards: cards};
}

// ── Sidebar ──
function renderSidebar() {
  const el = document.getElementById('draftList');
  if (!drafts.length) { el.innerHTML='<div class="sb-empty">目前沒有待審核稿件</div>'; return; }
  el.innerHTML = drafts.map((d,i)=>`
    <div class="draft-item ${i===activeDraftIdx?'active':''}" onclick="selectDraft(${i})">
      <div class="di-id">${d.稿件ID||`稿件 ${i+1}`}</div>
      <div class="di-title">${d.鉤子來源||'未命名'}</div>
      <div class="di-meta">${d.生成時間||''}</div>
      <span class="di-type">${d.模板類型||'文案'}</span>
    </div>`).join('');
}

// ── Select ──
function selectDraft(i) {
  activeDraftIdx = i;
  current = 0;
  renderSidebar();
  renderCarousel();
  renderReview();
}

// ── Theme ──
function setTheme(t, btn) {
  currentTheme = t;
  document.querySelectorAll('.theme-pill').forEach(p=>p.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderCarousel();
}

// ── Carousel — uses fixed id 'carouselContainer' ──
function renderCarousel() {
  const d = drafts[activeDraftIdx];
  if (!d) return;
  const cards = d._cards || [];
  const total = cards.length;

  document.getElementById('previewLabel').textContent = `Carousel 預覽 · ${total} 張（← → 鍵切換）`;
  document.getElementById('themeSelector').style.display = 'flex';
  document.getElementById('carouselNav').style.display = 'flex';

  const container = document.getElementById('carouselContainer');

  // extra theme-b decoration
  const barEl = currentTheme==='b' ? '<div class="card-bar"></div>' : '';
  const arcEl = currentTheme==='c' ? '<div class="card-arc"></div><div class="card-arc2"></div>' : '';

  container.innerHTML = `<div class="carousel-track" id="track">
    ${cards.map((c,i)=>`
      <div class="ig-card theme-${currentTheme} ${i===0?'active':''}" onclick="goTo(${i})">
        ${barEl}${arcEl}
        <div class="card-safe">
          <div class="card-top">
            <span class="card-num">0${i+1} / 0${total}</span>
            <span class="card-tag">${c.tag||''}</span>
          </div>
          <div class="card-body">
            <div class="card-headline">${hl(c.headline)}</div>
            ${c.copy?`<div class="card-copy">${c.copy.replace(/\n/g,'<br>')}</div>`:''}
          </div>
          <div class="card-bottom">
            <span class="card-brand">@insurance.insightTW</span>
          </div>
        </div>
      </div>`).join('')}
  </div>`;

  document.getElementById('dots').innerHTML = cards.map((_,i)=>
    `<div class="dot ${i===0?'active':''}" onclick="goTo(${i})"></div>`).join('');

  // wait for layout then size cards
  setTimeout(()=>{ sizecards(); goTo(0); }, 50);
  buildReeditTabs();
}

function hl(raw){ return (raw||'').replace(/\n/g,'<br>'); }
function hlEdit(raw){ return (raw||'').replace(/<br>/g,'\n'); }

// ── Card sizing ──
function sizecards(){
  const container = document.getElementById('carouselContainer');
  if(!container) return;
  const h = container.offsetHeight;
  const w = Math.round(h*4/5);
  document.querySelectorAll('.ig-card').forEach(c=>{
    c.style.height = h+'px';
    c.style.width = w+'px';
  });
}
function cardStep(){
  const c = document.querySelector('.ig-card');
  return c ? c.offsetWidth+GAP : 320+GAP;
}
function goTo(n){
  const cards=document.querySelectorAll('.ig-card');
  const dots=document.querySelectorAll('.dot');
  if(!cards.length) return;
  current=Math.max(0,Math.min(n,cards.length-1));
  const track=document.getElementById('track');
  if(track) track.style.transform=`translateX(-${current*cardStep()}px)`;
  cards.forEach((c,i)=>c.classList.toggle('active',i===current));
  dots.forEach((d,i)=>d.classList.toggle('active',i===current));
  document.getElementById('prevBtn').disabled=current===0;
  document.getElementById('nextBtn').disabled=current===cards.length-1;
}
function prev(){ goTo(current-1); }
function next(){ goTo(current+1); }

let rsz;
window.addEventListener('resize',()=>{
  clearTimeout(rsz);
  rsz=setTimeout(()=>{ sizecards(); goTo(current); },60);
});

// ── Review ──
function renderReview(){
  const d = drafts[activeDraftIdx];
  if(!d){ document.getElementById('reviewPanel').innerHTML='<div class="rev-empty">← 選擇左側稿件<br>開始審核</div>'; return; }
  const ht=(d.Hashtag||'').split(/\s+/).filter(Boolean).map(h=>`<span class="hashtag">${h}</span>`).join('');
  document.getElementById('reviewPanel').innerHTML=`
    <div class="review-block">
      <div class="review-title">稿件資訊</div>
      <div class="meta-grid">
        <div class="meta-item"><div class="meta-key">鉤子來源</div><div class="meta-val gold">${d.鉤子來源||'—'}</div></div>
        <div class="meta-item"><div class="meta-key">模板類型</div><div class="meta-val">${d.模板類型||'—'}</div></div>
        <div class="meta-item"><div class="meta-key">生成時間</div><div class="meta-val">${d.生成時間||'—'}</div></div>
        <div class="meta-item"><div class="meta-key">稿件ID</div><div class="meta-val">${d.稿件ID||'—'}</div></div>
      </div>
    </div>
    <div class="review-block">
      <div class="review-title">核心訊息</div>
      <div class="caption-box">${(d.核心訊息||'').replace(/\n/g,'<br>')}</div>
    </div>
    ${ht?`<div class="review-block"><div class="review-title">Hashtags</div><div class="hashtag-list">${ht}</div></div>`:''}
    <div class="review-block">
      <div class="review-title">建議發文時間</div>
      <div class="schedule-row">
        <span class="schedule-icon">◷</span>
        <div><div>${d.建議發文時間||'待設定'}</div><div class="schedule-sub">台北時間</div></div>
      </div>
    </div>
    <div class="actions">
      <div class="divider-line"></div>
      <button class="btn-agree" onclick="openConfirm()">✓ &nbsp;Agree — 排入排程</button>
      <div class="btn-row">
        <button class="btn-reedit" onclick="openReedit()">✎ &nbsp;Re-edit</button>
        <button class="btn-notgood" onclick="doNotGood()">✕ &nbsp;Not Good</button>
      </div>
    </div>`;
}

// ── Colour ──
function setAccent(c,d,btn){
  document.documentElement.style.setProperty('--gold',c);
  document.documentElement.style.setProperty('--gold-dim',d||shade(c,-25));
  document.querySelectorAll('.pal-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('customColor').value=c;
}
function onCustomColor(v){
  setAccent(v,shade(v,-25),null);
  document.querySelectorAll('.pal-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.pal-custom').classList.add('active');
}
function shade(hex,p){
  const n=parseInt(hex.replace('#',''),16);
  return '#'+[n>>16,(n>>8)&255,n&255].map(x=>Math.min(255,Math.max(0,x+p)).toString(16).padStart(2,'0')).join('');
}

// ── Re-edit ──
let activeTab=0;
const TAB_LABELS=['封面・鉤子','名人案例','台灣現實','對比','行動呼籲'];

function buildReeditTabs(){
  const d=drafts[activeDraftIdx]; if(!d) return;
  document.getElementById('reeditTabs').innerHTML=d._cards.map((c,i)=>`
    <div class="r-tab ${i===0?'active':''}" onclick="switchTab(${i})">
      <span class="r-tab-num">0${i+1}</span>${TAB_LABELS[i]||`張 ${i+1}`}
    </div>`).join('');
}
function openReedit(){
  activeTab=current; loadTab(activeTab);
  const p=document.getElementById('reeditPanel');
  p.classList.add('open');
  const s=document.getElementById('reeditSheet');
  s.style.left='50%'; s.style.top='80px'; s.style.transform='translateX(-50%)';
}
function closeReedit(){ document.getElementById('reeditPanel').classList.remove('open'); }
function switchTab(n){ saveTab(activeTab); activeTab=n; loadTab(n); document.querySelectorAll('.r-tab').forEach((t,i)=>t.classList.toggle('active',i===n)); }
function loadTab(n){
  const d=drafts[activeDraftIdx]; if(!d) return;
  const c=d._cards[n]||{};
  document.getElementById('editHL').value=hlEdit(c.headline||'');
  document.getElementById('editCP').value=c.copy||'';
}
function saveTab(n){
  const d=drafts[activeDraftIdx]; if(!d||!d._cards[n]) return;
  d._cards[n].headline=document.getElementById('editHL').value;
  d._cards[n].copy=document.getElementById('editCP').value;
}
function addNote(el,txt){
  el.classList.toggle('sel');
  const ta=document.getElementById('editNote');
  if(el.classList.contains('sel')) ta.value=ta.value?ta.value+'\n'+txt:txt;
}
function applyEdits(){ saveTab(activeTab); renderCarousel(); closeReedit(); showToast('✓ 文案已更新','a'); }

// Drag
(function(){
  const sheet=document.getElementById('reeditSheet');
  const bar=document.getElementById('reeditBar');
  let drag=false,ox=0,oy=0;
  bar.addEventListener('mousedown',e=>{
    if(e.target.closest('button')) return;
    drag=true;
    const r=sheet.getBoundingClientRect();
    sheet.style.transform='none'; sheet.style.left=r.left+'px'; sheet.style.top=r.top+'px';
    ox=e.clientX-r.left; oy=e.clientY-r.top; e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{ if(!drag) return; sheet.style.left=Math.max(0,Math.min(e.clientX-ox,window.innerWidth-sheet.offsetWidth))+'px'; sheet.style.top=Math.max(0,Math.min(e.clientY-oy,window.innerHeight-sheet.offsetHeight))+'px'; });
  document.addEventListener('mouseup',()=>{ drag=false; });
})();

// ── Agree ──
function openConfirm(){
  document.getElementById('confirmTime').textContent=drafts[activeDraftIdx]?.建議發文時間||'待設定';
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){
  document.getElementById('confirmOverlay').classList.remove('open');
  const d=drafts[activeDraftIdx];
  if(d){ fetch(GAS_URL,{method:'POST',body:JSON.stringify({id:d.稿件ID,status:'已通過審核'})}).catch(()=>{}); }
  removeCurrent(); showToast('✓ 已排程發佈','g');
}
function doNotGood(){
  const d=drafts[activeDraftIdx];
  if(d){ fetch(GAS_URL,{method:'POST',body:JSON.stringify({id:d.稿件ID,status:'Not Good'})}).catch(()=>{}); }
  removeCurrent(); showToast('✕ 已標記 Not Good','r');
}
function removeCurrent(){
  drafts.splice(activeDraftIdx,1);
  document.getElementById('draftCount').textContent=drafts.length;
  activeDraftIdx=Math.min(activeDraftIdx,drafts.length-1);
  renderSidebar();
  if(drafts.length>0) selectDraft(activeDraftIdx<0?0:activeDraftIdx);
  else{
    document.getElementById('carouselContainer').innerHTML='<div class="c-empty"><div class="c-empty-icon">🎉</div><div class="c-empty-text">所有稿件已審核完畢</div></div>';
    document.getElementById('carouselNav').style.display='none';
    document.getElementById('themeSelector').style.display='none';
    document.getElementById('reviewPanel').innerHTML='<div class="rev-empty">所有稿件已審核完畢 🎉</div>';
  }
}

// Toast
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' t'+type:'');
  setTimeout(()=>{ t.className='toast'; },3200);
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('reeditPanel').classList.contains('open')){ if(e.key==='Escape') closeReedit(); return; }
  if(e.key==='ArrowLeft') prev();
  if(e.key==='ArrowRight') next();
  if(e.key==='Escape') document.getElementById('confirmOverlay').classList.remove('open');
});

// Init
